server {
    listen 80;

    # Statische Dateien ausliefern
    location / {
        root  /usr/share/nginx/html;
        index index.html;
    }

    # Anfragen an /api/ werden intern ans Flask-Backend weitergeleitet.
    # Das nennt man Reverse Proxy – der Browser merkt davon nichts.
    location /api/ {
        proxy_pass http://backend:5000/;
    }
}