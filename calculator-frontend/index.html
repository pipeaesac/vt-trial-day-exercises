<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Taschenrechner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f4f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .karte {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 340px;
    }

    h1 {
      text-align: center;
      margin: 0 0 24px;
    }

    label {
      display: block;
      margin: 12px 0 4px;
      font-weight: bold;
      color: #555;
    }

    input, select {
      width: 100%;
      padding: 8px 10px;
      font-size: 1rem;
      border: 1px solid #ccd;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      font-size: 1rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover { background: #1d4ed8; }

    #ergebnis {
      margin-top: 20px;
      padding: 16px;
      background: #f0f5ff;
      border-radius: 8px;
      text-align: center;
      font-size: 1.2rem;
    }

    #ergebnis.fehler {
      background: #fff0f0;
      color: #c0392b;
    }
  </style>
</head>
<body>

  <div class="karte">
    <h1>🧮 Taschenrechner</h1>

    <label for="zahl1">Erste Zahl</label>
    <input type="number" id="zahl1" value="0" />

    <label for="operator">Operator</label>
    <select id="operator">
      <option value="+">+ (addieren)</option>
      <option value="-">− (subtrahieren)</option>
      <option value="*">× (multiplizieren)</option>
      <option value="/">÷ (dividieren)</option>
    </select>

    <label for="zahl2">Zweite Zahl</label>
    <input type="number" id="zahl2" value="0" />

    <button onclick="rechnen()">= Berechnen</button>

    <div id="ergebnis">Ergebnis erscheint hier</div>
  </div>


  <script>
    async function rechnen() {
      // Schritt 1: Werte aus dem Formular lesen
      var zahl1    = Number(document.getElementById("zahl1").value);
      var zahl2    = Number(document.getElementById("zahl2").value);
      var operator = document.getElementById("operator").value;

      var ergebnisBox = document.getElementById("ergebnis");
      ergebnisBox.className = "";
      ergebnisBox.textContent = "Berechne...";

      // Schritt 2: Anfrage ans Backend schicken
      try {
        const antwort = await fetch("/api/v1/rechnen", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ zahl1: zahl1, zahl2: zahl2, operator: operator })
        });

        const daten = await antwort.json();

        // Schritt 3: Ergebnis oder Fehler anzeigen
        if (daten.ergebnis !== undefined) {
          ergebnisBox.textContent = zahl1 + " " + operator + " " + zahl2 + " = " + daten.ergebnis;
        } else {
          ergebnisBox.className = "fehler";
          ergebnisBox.textContent = daten.fehler;
        }

      } catch (e) {
        ergebnisBox.className = "fehler";
        ergebnisBox.textContent = "Fehler – läuft der Server?";
      }
    }
  </script>

</body>
</html>
